<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Utama — Support Back TLC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-900:#0a1a33;
    --navy-800:#0f2347;
    --navy-700:#16305e;
    --navy-600:#1d3f78;
    --navy-500:#2a5298;
    --accent:#2962ff;
    --white:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    font-family:'Roboto', sans-serif;
    background:linear-gradient(135deg, var(--navy-900) 0%, var(--navy-700) 55%, var(--navy-600) 100%);
    color:#fff;
  }

  .page-bg{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    position:relative;
    overflow:hidden;
  }
  /* dekorasi halus di background navy */
  .page-bg::before,
  .page-bg::after{
    content:'';
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.04);
    pointer-events:none;
  }
  .page-bg::before{ width:520px; height:520px; top:-180px; right:-160px; }
  .page-bg::after{ width:380px; height:380px; bottom:-140px; left:-120px; }

  .brand{
    text-align:center;
    margin-bottom:44px;
    position:relative;
    z-index:2;
  }
  .brand .badge{
    display:inline-block;
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#bcd0f7;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.18);
    padding:6px 16px;
    border-radius:999px;
    margin-bottom:18px;
  }
  .brand h1{
    margin:0;
    font-size:clamp(26px, 4vw, 40px);
    font-weight:900;
    letter-spacing:-0.01em;
  }
  .brand p{
    margin:10px 0 0;
    color:#c3d2ef;
    font-size:15px;
  }

  .menu-grid{
    display:grid;
    grid-template-columns:repeat(3, minmax(240px, 320px));
    gap:26px;
    position:relative;
    z-index:2;
    width:100%;
    max-width:1040px;
  }
  @media (max-width:980px){
    .menu-grid{ grid-template-columns:repeat(2, minmax(240px, 320px)); max-width:700px; }
  }
  @media (max-width:640px){
    .menu-grid{ grid-template-columns:1fr; max-width:340px; }
  }

  .menu-card{
    background:var(--white);
    color:var(--navy-900);
    border-radius:18px;
    padding:30px 24px;
    text-align:center;
    text-decoration:none;
    box-shadow:0 14px 34px rgba(0,0,0,.28);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    transition:transform .18s ease, box-shadow .18s ease;
    border:1px solid rgba(255,255,255,0.6);
  }
  .menu-card:hover{
    transform:translateY(-6px);
    box-shadow:0 20px 44px rgba(0,0,0,.34);
  }
  .menu-card:active{ transform:translateY(-2px); }

  .menu-card .num{
    width:46px; height:46px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--navy-700), var(--accent));
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-weight:900;
    font-size:18px;
  }
  .menu-card .icon{ font-size:34px; line-height:1; }
  .menu-card .title{
    font-size:17px;
    font-weight:700;
    color:var(--navy-900);
  }
  .menu-card .desc{
    font-size:12.5px;
    color:#5c6b7e;
    line-height:1.4;
  }

  footer{
    text-align:center;
    padding:18px 16px;
    font-size:12.5px;
    color:#a9bce4;
    background:rgba(0,0,0,0.12);
    position:relative;
    z-index:2;
  }
</style>
</head>
<body>

  <div class="page-bg">
    <div class="brand">
      <span class="badge">MITRA10 Tallasa City Makassar</span>
      <p>Silakan pilih modul yang ingin digunakan</p>
    </div>

    <div class="menu-grid">
      <a class="menu-card" href="Dashboard_Stock_Report.html">
        <div class="num">1</div>
        <div class="icon">📦</div>
        <div class="title">Analisa Prepare SO</div>
      </a>

      <a class="menu-card" href="Dashboard_Sampling_Akurasi_Lokasi.html">
        <div class="num">2</div>
        <div class="icon">📍</div>
        <div class="title">Sampling Lokasi</div>
      </a>

      <a class="menu-card" href="Dashboard_Akurasi_Stock_Opname.html">
        <div class="num">3</div>
        <div class="icon">🧮</div>
        <div class="title">Akurasi WMS vs NAV</div>
      </a>
    </div>
  </div>

  <footer>©<span id="ftYear"></span> Powered By Support Back TLC</footer>

  <script>
    document.getElementById('ftYear').textContent = new Date().getFullYear();
  </script>

</body>
</html>
